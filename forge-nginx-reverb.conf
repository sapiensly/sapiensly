# Forge Nginx Reverb WebSocket Proxy + upload size
#
# Add this to your Forge site's Nginx config (Edit Nginx Configuration),
# inside the `server` block, BEFORE the final `location` block.
#
# In Forge: Sites → your-site → Nginx → Edit Nginx Configuration
# Paste the directives below.

# --- File uploads (Playground OCR/audio, chat attachments) ---
# Nginx's default cap (~1M) rejects larger uploads with a raw
# "413 Request Entity Too Large" before the request reaches PHP. The app
# accepts up to 30M, so allow at least that here. Also raise the matching PHP
# limits (upload_max_filesize, post_max_size) to 32M in the site's PHP ini.
client_max_body_size 32M;

location /app {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Scheme $scheme;
    proxy_set_header SERVER_PORT $server_port;
    proxy_set_header REMOTE_ADDR $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_pass http://0.0.0.0:8080;
}

# Forge .env values for production:
#
# REVERB_HOST="yourdomain.com"
# REVERB_PORT=443
# REVERB_SCHEME=https
# REVERB_SERVER_HOST=0.0.0.0
# REVERB_SERVER_PORT=8080
# (no REVERB_TLS_CERT or REVERB_TLS_KEY — nginx handles TLS)
#
# VITE_REVERB_APP_KEY="${REVERB_APP_KEY}"
# VITE_REVERB_HOST="${REVERB_HOST}"
# VITE_REVERB_PORT="${REVERB_PORT}"
# VITE_REVERB_SCHEME="${REVERB_SCHEME}"
#
# Forge Daemons:
# 1. Horizon: php artisan horizon (directory: /home/forge/yourdomain.com)
# 2. Reverb:  php artisan reverb:start (directory: /home/forge/yourdomain.com)
